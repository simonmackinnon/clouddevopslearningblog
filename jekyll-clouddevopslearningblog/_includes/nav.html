<nav class="site-nav">
  <div class="nav-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="The Cloud DevOps Learning Blog">
    <picture>
        <!-- Mobile: compact icon -->
        <source media="(max-width: 640px)" srcset="{{ '/assets/img/happy-prompt-smile-icon.svg' | relative_url }}">
        <!-- Default: horizontal lockup -->
        <img
        src="{{ '/logo.svg' | relative_url }}"
        alt=""
        height="150"
        decoding="async"
        fetchpriority="high"
        style="height:150px; width:auto;">
    </picture>
    <span class="sr-only">The Cloud DevOps Learning Blog</span>
    </a>

    <details class="nav-details">
      <summary class="nav-btn" aria-label="Open menu">Menu</summary>

      <ul class="nav-list">
        {% for item in site.texture.navigation %}
          <li class="nav-item{% if item.dropdown == 'posts' %} has-dd{% endif %}">
            <a href="{{ item.url | relative_url }}"
               class="{% if page.url == item.url or page.url contains item.url %}active{% endif %}">
              {{ item.title }}
            </a>

            {% if item.dropdown == 'posts' %}
              <ul class="dropdown">
                {% for post in site.posts limit:10 %}
                  <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
                {% endfor %}
                <li class="see-all"><a href="{{ '/blog/' | relative_url }}">See all →</a></li>
              </ul>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </details>
  </div>
</nav>
