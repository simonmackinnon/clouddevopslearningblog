<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/override.css' | relative_url }}">
<link rel="shortcut icon" type="image/png" href="{{ '/logo.ico' | relative_url }}">

<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.excerpt | default: site.texture.tagline | strip_html | strip_newlines | truncate: 160 }}">
<meta property="og:image" content="https://theclouddevopslearningblog.com/logo.svg">
<meta property="og:url" content="https://theclouddevopslearningblog.com{{ page.url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image:alt" content="The Cloud DevOps Learning Blog">

<title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
{% seo %}
