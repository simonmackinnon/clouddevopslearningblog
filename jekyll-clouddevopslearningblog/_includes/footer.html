<footer class="site-footer">
  <div class="footer-inner">
    <p>© {{ "now" | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    <ul class="footer-links">
      <li><a href="https://jekyllrb.com" rel="noopener">Built with Jekyll</a></li>
      {% if site.github_username %}
      <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a></li>
      {% endif %}
      {% if site.rss %}
      <li><a href="{{ site.rss | relative_url }}">RSS</a></li>
      {% endif %}
    </ul>
  </div>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RPCZV2V9HM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RPCZV2V9HM');
  </script>
</footer>
