<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#sky)" rx="18"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">TypeStar — AWS Architecture</text>
  <text x="480" y="51" text-anchor="middle" font-size="10" fill="#94a3b8">typestar.theclouddevopslearningblog.com</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- EXTERNAL CARDS (left strip, x=14–132)      -->
  <!-- Left-margin routing corridor: x=133–155    -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Browser -->
  <rect x="14" y="76" width="118" height="70" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="73" y="100" text-anchor="middle" font-size="22">🌐</text>
  <text x="73" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">Browser</text>
  <text x="73" y="135" text-anchor="middle" font-size="9" fill="#94a3b8">User / HTTPS</text>

  <!-- ElevenLabs -->
  <rect x="14" y="268" width="118" height="76" rx="12" fill="rgba(251,191,36,0.10)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="5 3" filter="url(#card-shadow)"/>
  <text x="73" y="292" text-anchor="middle" font-size="20">🔊</text>
  <text x="73" y="311" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">ElevenLabs</text>
  <text x="73" y="326" text-anchor="middle" font-size="9" fill="#94a3b8">TTS · build-time only</text>
  <text x="73" y="337" text-anchor="middle" font-size="8" fill="#64748b">53 MP3s generated</text>

  <!-- GitHub Actions -->
  <rect x="14" y="432" width="118" height="70" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="73" y="455" text-anchor="middle" font-size="20">⚙️</text>
  <text x="73" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">GitHub Actions</text>
  <text x="73" y="489" text-anchor="middle" font-size="9" fill="#94a3b8">infra.yml · deploy.yml</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- AWS REGION BOX  x=155–945  y=63–460        -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="155" y="63" width="790" height="400" rx="14" fill="rgba(255,153,0,0.04)" stroke="rgba(255,153,0,0.22)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="937" y="81" text-anchor="end" font-size="10" fill="#FF9900" font-weight="600">ap-southeast-2</text>

  <!-- ─── ROW 1: Delivery (y=76–146) ─── -->

  <!-- CloudFront -->
  <rect x="170" y="76" width="155" height="70" rx="12" fill="rgba(255,153,0,0.15)" stroke="#FF9900" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="247" y="98"  text-anchor="middle" font-size="11" font-weight="700" fill="#FF9900">CloudFront</text>
  <text x="247" y="113" text-anchor="middle" font-size="9"  fill="#fbbf24">CDN · OAI · HTTPS</text>
  <text x="247" y="127" text-anchor="middle" font-size="8"  fill="#94a3b8">Routes /api/* → API GW</text>
  <text x="247" y="139" text-anchor="middle" font-size="8"  fill="#94a3b8">TLS via ACM · DNS via Route 53</text>

  <!-- S3 -->
  <rect x="375" y="76" width="160" height="70" rx="12" fill="rgba(52,211,153,0.13)" stroke="#34d399" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="455" y="98"  text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">S3 Bucket</text>
  <text x="455" y="113" text-anchor="middle" font-size="9"  fill="#6ee7b7">SPA + pre-generated audio</text>
  <text x="455" y="127" text-anchor="middle" font-size="8"  fill="#94a3b8">index.html · app.js · /audio/*.mp3</text>
  <text x="455" y="139" text-anchor="middle" font-size="8"  fill="#94a3b8">Private (OAI) · immutable cache</text>

  <!-- ACM -->
  <rect x="590" y="76" width="150" height="70" rx="12" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="665" y="98"  text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">ACM Certificate</text>
  <text x="665" y="113" text-anchor="middle" font-size="9"  fill="#c4b5fd">TLS/SSL · us-east-1</text>
  <text x="665" y="127" text-anchor="middle" font-size="8"  fill="#94a3b8">DNS-validated</text>
  <text x="665" y="139" text-anchor="middle" font-size="8"  fill="#94a3b8">Used by CloudFront</text>

  <!-- Route 53 -->
  <rect x="795" y="76" width="135" height="70" rx="12" fill="rgba(255,153,0,0.15)" stroke="#FF9900" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="862" y="98"  text-anchor="middle" font-size="11" font-weight="700" fill="#FF9900">Route 53</text>
  <text x="862" y="113" text-anchor="middle" font-size="9"  fill="#fbbf24">DNS — A aliases</text>
  <text x="862" y="127" text-anchor="middle" font-size="8"  fill="#94a3b8">typestar.* → CloudFront</text>
  <text x="862" y="139" text-anchor="middle" font-size="8"  fill="#94a3b8">typestar-auth.* → Cognito</text>

  <!-- ─── ROW 2: Compute (y=200–270) ─── -->

  <!-- API Gateway -->
  <rect x="170" y="200" width="155" height="70" rx="12" fill="rgba(255,153,0,0.15)" stroke="#FF9900" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="247" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#FF9900">API Gateway</text>
  <text x="247" y="237" text-anchor="middle" font-size="9"  fill="#fbbf24">HTTP API v2</text>
  <text x="247" y="251" text-anchor="middle" font-size="8"  fill="#94a3b8">JWT authoriser (Cognito)</text>
  <text x="247" y="263" text-anchor="middle" font-size="8"  fill="#94a3b8">POST /progress  GET /progress</text>

  <!-- Lambda -->
  <rect x="375" y="200" width="160" height="70" rx="12" fill="rgba(56,189,248,0.13)" stroke="#38bdf8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="455" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">Lambda</text>
  <text x="455" y="237" text-anchor="middle" font-size="9"  fill="#7dd3fc">Node.js 20 · TypeScript</text>
  <text x="455" y="251" text-anchor="middle" font-size="8"  fill="#94a3b8">Save / load user progress</text>
  <text x="455" y="263" text-anchor="middle" font-size="8"  fill="#94a3b8">128 MB · 10 s timeout</text>

  <!-- DynamoDB -->
  <rect x="590" y="200" width="340" height="70" rx="12" fill="rgba(56,189,248,0.13)" stroke="#38bdf8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="760" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">DynamoDB</text>
  <text x="760" y="237" text-anchor="middle" font-size="9"  fill="#7dd3fc">typestar-progress  ·  PAY_PER_REQUEST</text>
  <text x="760" y="251" text-anchor="middle" font-size="8"  fill="#94a3b8">PK: userId   SK: levelId</text>
  <text x="760" y="263" text-anchor="middle" font-size="8"  fill="#94a3b8">stars · wpm · accuracy · timestamps</text>

  <!-- ─── ROW 3: Auth + IaC (y=328–428) ─── -->

  <!-- Cognito -->
  <rect x="170" y="328" width="365" height="96" rx="12" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="352" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">Cognito User Pool</text>
  <text x="352" y="366" text-anchor="middle" font-size="9"  fill="#c4b5fd">Email/password (SRP)  +  Google OAuth via hosted UI</text>
  <text x="352" y="381" text-anchor="middle" font-size="8"  fill="#94a3b8">typestar-auth.auth.ap-southeast-2.amazoncognito.com</text>
  <text x="352" y="395" text-anchor="middle" font-size="8"  fill="#94a3b8">Google IdP · callback: /callback · tokens: 1 h / 30 d</text>
  <text x="352" y="409" text-anchor="middle" font-size="8"  fill="#94a3b8">Issues JWTs that authorise API Gateway requests</text>
  <text x="352" y="421" text-anchor="middle" font-size="8"  fill="#64748b">Browser login flows through Cognito hosted UI</text>

  <!-- Terraform -->
  <rect x="590" y="328" width="340" height="96" rx="12" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="760" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">Terraform</text>
  <text x="760" y="366" text-anchor="middle" font-size="9"  fill="#c4b5fd">Infrastructure as Code</text>
  <text x="760" y="381" text-anchor="middle" font-size="8"  fill="#94a3b8">Remote state → S3 (typestar-terraform-state)</text>
  <text x="760" y="395" text-anchor="middle" font-size="8"  fill="#94a3b8">Provisions: CloudFront · S3 · ACM · Route 53</text>
  <text x="760" y="409" text-anchor="middle" font-size="8"  fill="#94a3b8">API GW · Lambda · DynamoDB · Cognito</text>
  <text x="760" y="421" text-anchor="middle" font-size="8"  fill="#64748b">google_client_secret via GitHub Secrets → TF_VAR</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROWS — carefully routed, no crossings    -->
  <!--                                            -->
  <!-- Left-margin corridor x=133–155:            -->
  <!--   x=140  ElevenLabs→S3 (yellow, upward)   -->
  <!-- Y=418 corridor (below row-3 cards, y=424): -->
  <!--   GitHub Actions → Terraform               -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- 1. Browser → CloudFront (HTTPS) -->
  <line x1="132" y1="111" x2="168" y2="111" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="150" y="105" text-anchor="middle" font-size="8" fill="#38bdf8">HTTPS</text>

  <!-- 2. CloudFront → S3 (OAI — serves SPA + audio) -->
  <line x1="325" y1="111" x2="373" y2="111" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="349" y="105" text-anchor="middle" font-size="8" fill="#f97316">OAI</text>

  <!-- 3. CloudFront ↓ API Gateway (/api/* routing) -->
  <line x1="247" y1="146" x2="247" y2="198" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="259" y="176" font-size="8" fill="#38bdf8">/api/*</text>

  <!-- 4. API Gateway → Lambda (invoke) -->
  <line x1="325" y1="235" x2="373" y2="235" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="349" y="229" text-anchor="middle" font-size="8" fill="#38bdf8">invoke</text>

  <!-- 5. Lambda → DynamoDB (read/write) -->
  <line x1="535" y1="235" x2="588" y2="235" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="562" y="229" text-anchor="middle" font-size="8" fill="#38bdf8">PutItem / GetItem</text>

  <!-- 6. API Gateway ↓ Cognito (JWT verify) -->
  <line x1="247" y1="270" x2="247" y2="326" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>
  <text x="259" y="302" font-size="8" fill="#a78bfa">JWT verify</text>

  <!-- 7. GitHub Actions ↑ ElevenLabs (build-time: calls TTS API) -->
  <line x1="73" y1="432" x2="73" y2="346" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <text x="55" y="394" text-anchor="middle" font-size="8" fill="#fbbf24" transform="rotate(-90,55,394)">calls API</text>

  <!-- 8. ElevenLabs → S3 (build-time: upload MP3s)
       Route: right to x=140 (left-margin corridor), UP to y=130
       (above CF→API GW arrow which starts at y=146), then right to S3 left edge.
       x=140 is between external-card right edge (132) and AWS box left (155) — clear corridor.
       Vertical at x=140 spans y=306→130; CF↓APIGW vertical at x=247 starts at y=146 — no crossing. -->
  <path d="M 132 306 L 140 306 L 140 130 L 373 130"
        stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-yellow)"/>
  <text x="256" y="124" text-anchor="middle" font-size="8" fill="#fbbf24">upload audio/*.mp3</text>

  <!-- 9. GitHub Actions → Terraform (tf apply)
       Route: up from GH Actions right edge to y=424 (below Cognito/Terraform bottom y=424,
       above GH Actions top y=432), across to Terraform left edge x=590, then up into card.
       y=424 corridor is clear — no vertical arrows cross it in the x=132–590 range. -->
  <path d="M 132 467 L 132 424 L 588 424 L 588 380"
        stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text x="355" y="418" text-anchor="middle" font-size="8" fill="#a78bfa">terraform apply</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND                                     -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="155" y="473" width="790" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="173" y="490" font-size="9" font-weight="600" fill="#94a3b8">CI/CD (deploy.yml on push → main):</text>
  <text x="173" y="504" font-size="8" fill="#64748b">① npm test  ② restore audio cache  ③ tsx generate-audio.ts → ElevenLabs  ④ vite build (manifest baked in)  ⑤ aws s3 sync dist/  ⑥ CloudFront invalidation</text>
  <text x="173" y="518" font-size="8" fill="#64748b">infra.yml (on push to infra/):  terraform init → plan → apply  ·  Secrets: AWS creds · GOOGLE_CLIENT_SECRET · ELEVENLABS_API_KEY</text>

  <line x1="540" y1="487" x2="560" y2="487" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="564" y="491" font-size="8" fill="#94a3b8">User request</text>
  <line x1="630" y1="487" x2="650" y2="487" stroke="#f97316" stroke-width="1.5"/>
  <text x="654" y="491" font-size="8" fill="#94a3b8">OAI (private S3)</text>
  <line x1="730" y1="487" x2="750" y2="487" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="754" y="491" font-size="8" fill="#94a3b8">Auth / IaC</text>
  <line x1="810" y1="487" x2="830" y2="487" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="834" y="491" font-size="8" fill="#94a3b8">Build-time</text>
</svg>
